<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            width:350px;
            box-shadow:0 4px 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
            border-radius:10px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            background:#16a34a;
            color:white;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        a{
            text-decoration:none;
        }

    </style>
</head>
<body>

<div class="card">

    <h1>Registro</h1>

    <input id="username"
           type="text"
           placeholder="Usuario">

    <input id="password"
           type="password"
           placeholder="Contraseña">

    <button onclick="register()">
        Registrarse
    </button>

    <div class="login-link">
        ¿Ya tienes cuenta?
        <a href="/login-page">
            Inicia sesión
        </a>
    </div>

</div>

<script>

    async function register(){

        const username =
            document.getElementById(
                "username"
            ).value;

        const password =
            document.getElementById(
                "password"
            ).value;

        const response =
            await fetch(
                "/auth/register",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body:JSON.stringify({
                        username,
                        password
                    })
                }
            );

        const message =
            await response.text();

        alert(message);

        if(message ===
            "Usuario registrado"){

            window.location.href =
                "/login-page";
        }
    }

</script>

</body>
</html>
